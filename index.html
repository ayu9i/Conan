<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Advanced Hub | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --conan-gold: #d4af37;
            --conan-black: #050505;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; font-family: 'Kanit', sans-serif; background: #000;
            background-image: radial-gradient(circle at 20% 20%, rgba(20, 40, 80, 0.5) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(60, 20, 20, 0.3) 0%, transparent 40%);
            color: white; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 50px;
        }

        .container { width: 100%; max-width: 500px; padding: 30px 15px; text-align: center; }
        .premium-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 24px; padding: 25px 20px; backdrop-filter: blur(15px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }

        .result-container { margin: 15px 0; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .info-badge { display: inline-block; padding: 4px 12px; background: rgba(212, 175, 55, 0.1); border: 1px solid var(--conan-gold); border-radius: 50px; font-size: 0.8rem; color: var(--conan-gold); margin-bottom: 8px; opacity: 0; transition: 0.3s; }
        .info-badge.show { opacity: 1; }

        .ep-display { font-size: 1.6rem; font-weight: 600; color: #fff; opacity: 0; transform: translateY(15px); transition: 0.4s; }
        .ep-display span { color: var(--conan-gold); font-size: 1.1rem; display: block; margin-top: 5px; font-weight: 300; }
        .ep-display.show { opacity: 1; transform: translateY(0); }

        .btn-main { width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-family: 'Kanit'; }
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #f1d57a 100%); color: #000; }
        .btn-char { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--conan-gold); }

        /* History Section */
        .history-card { margin-top: 25px; text-align: left; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .history-title { font-size: 0.9rem; color: var(--conan-gold); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .history-list { max-height: 200px; overflow-y: auto; font-size: 0.85rem; }
        .history-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
        .history-item.checked { opacity: 0.5; text-decoration: line-through; }

        /* Doors */
        .door-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: flex; }
        .door { position: absolute; width: 50%; height: 100%; background: #050505; transition: 0.6s ease-in-out; border: 1px solid var(--conan-gold); }
        .door-left { left: -50%; } .door-right { right: -50%; }
        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }

        select { background: #111; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-family: 'Kanit'; }
    </style>
</head>
<body>

<div class="door-container" id="doorSystem">
    <div class="door door-left"></div><div class="door door-right"></div>
</div>

<div class="container">
    <h2 style="letter-spacing: 2px; margin-bottom: 5px;">CONAN HUB <small style="font-size: 0.5em; vertical-align: middle;">PRO</small></h2>
    
    <div class="premium-card">
        <div id="badge" class="info-badge">สืบค้นคดี...</div>
        <div class="result-container">
            <h2 id="epDisplay" class="ep-display">พร้อมวิเคราะห์คดี!</h2>
        </div>

        <button class="btn-main btn-gold" onclick="spinAll()">สุ่มทุกตอน (ซีซั่น 1-25)</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select id="charSelect">
                <option value="kid">จอมโจรคิด 🎩</option>
                <option value="ai">ไฮบาระ ไอ 🧪</option>
                <option value="amuro">อามุโร่ (ซีโร่) ☕</option>
                <option value="akai">อากาอิ ชูอิจิ 🔫</option>
            </select>
            <button class="btn-main btn-char" onclick="spinChar()">สุ่มตามตัวละคร</button>
        </div>

        <div class="history-card">
            <div class="history-title">ประวัติการสุ่ม <span onclick="clearHistory()" style="cursor:pointer; color: #888;">[ล้างประวัติ]</span></div>
            <div id="historyList" class="history-list">
                <div style="color:#666; text-align:center; padding:10px;">ยังไม่มีประวัติการสุ่ม</div>
            </div>
        </div>
    </div>
</div>

<script>
    const charData = {
        kid: [78, 79, 139, 140, 235, 236, 381, 382, 430, 431, 512, 513, 562, 563, 678, 775, 776],
        ai: [136, 137, 138, 148, 149, 190, 191, 192, 249, 250, 298, 299, 365, 366, 753, 754],
        amuro: [719, 720, 721, 751, 752, 755, 756, 832, 833, 834, 835, 836, 837, 851, 936],
        akai: [249, 250, 277, 278, 309, 310, 311, 333, 334, 369, 370, 538, 539, 540, 551, 832]
    };

    const seasonRanges = [];
    let currentStart = 1;
    for (let i = 1; i <= 24; i++) {
        let count = (i <= 18) ? 44 : 52;
        let end = currentStart + count - 1;
        seasonRanges.push({ s: i, start: currentStart, end: end });
        currentStart = end + 1;
    }
    const s25Max = 11;

    let history = JSON.parse(localStorage.getItem('conanHistory')) || [];
    renderHistory();

    function startSpin(randomFn) {
        const doors = document.getElementById('doorSystem');
        doors.classList.add('active');
        setTimeout(() => {
            document.getElementById('epDisplay').classList.remove('show');
            document.getElementById('badge').classList.remove('show');
            randomFn();
        }, 600);
        setTimeout(() => doors.classList.remove('active'), 1400);
        setTimeout(() => {
            document.getElementById('epDisplay').classList.add('show');
            document.getElementById('badge').classList.add('show');
        }, 1800);
    }

    function spinAll() {
        startSpin(() => {
            const iqiyiMax = seasonRanges[23].end;
            const rand = Math.floor(Math.random() * (iqiyiMax + s25Max)) + 1;
            let result = "";
            if (rand <= iqiyiMax) {
                const f = seasonRanges.find(r => rand >= r.start && rand <= r.end);
                result = `ซีซั่น ${f.s} ตอนที่ ${rand}`;
            } else {
                result = `ซีซั่น 25 ตอนที่ ${rand - iqiyiMax}`;
            }
            updateUI(result, "สุ่มตอนทั้งหมด");
            addToHistory(result);
        });
    }

    function spinChar() {
        startSpin(() => {
            const char = document.getElementById('charSelect').value;
            const pool = charData[char];
            const randEp = pool[Math.floor(Math.random() * pool.length)];
            const f = seasonRanges.find(r => randEp >= r.start && randEp <= r.end);
            const result = `ซีซั่น ${f.s} ตอนที่ ${randEp}`;
            const charNames = {kid: "จอมโจรคิด", ai: "ไฮบาระ", amuro: "อามุโร่", akai: "อากาอิ"};
            updateUI(result, `เจอตัวละคร: ${charNames[char]}`);
            addToHistory(result);
        });
    }

    function updateUI(main, badgeText) {
        document.getElementById('epDisplay').innerHTML = main;
        document.getElementById('badge').innerHTML = badgeText;
    }

    function addToHistory(text) {
        history.unshift({ id: Date.now(), text: text, checked: false });
        if (history.length > 20) history.pop();
        saveAndRender();
    }

    function toggleCheck(id) {
        const item = history.find(h => h.id === id);
        if (item) item.checked = !item.checked;
        saveAndRender();
    }

    function clearHistory() {
        if(confirm("ล้างประวัติการสุ่มทั้งหมด?")) {
            history = [];
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('conanHistory', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div style="color:#666; text-align:center; padding:10px;">ยังไม่มีประวัติการสุ่ม</div>';
            return;
        }
        list.innerHTML = history.map(h => `
            <div class="history-item ${h.checked ? 'checked' : ''}" onclick="toggleCheck(${h.id})">
                <span>${h.text}</span>
                <span>${h.checked ? '✅ ดูแล้ว' : '⭕ ยังไม่ได้ดู'}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
