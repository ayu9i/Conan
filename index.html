<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST MODE - Countdown 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow: hidden; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-glow { text-shadow: 0 0 25px rgba(59, 130, 246, 0.6); }
        #ban-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: #ff0000; }
        .glitch-text { font-size: 4rem; font-weight: 900; animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); } 40% { transform: translate(-3px, -3px); } 60% { transform: translate(3px, 3px); } 80% { transform: translate(3px, -3px); } 100% { transform: translate(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="ban-screen">
        <div class="glitch-text italic">ACCESS DENIED</div>
        <div class="h-1 w-64 bg-red-600 my-8"></div>
        <p class="text-xl tracking-[0.4em] uppercase font-bold text-center">ระบบทดสอบ: การแบนเสร็จสมบูรณ์</p>
    </div>

    <main id="main-ui" class="relative z-10 text-center w-full max-w-5xl">
        <div class="mb-12 opacity-70">
            <p class="text-[10px] tracking-[0.5em] uppercase mb-2 text-blue-400 font-bold">Current Test Time</p>
            <div id="clock" class="text-3xl font-extralight tracking-widest text-white">00:00:00</div>
        </div>

        <h1 id="title" class="text-4xl md:text-6xl font-extralight tracking-tighter text-glow mb-16 uppercase">
            Test Mode: <span class="font-black text-blue-500">Celebrating in a few minutes</span>
        </h1>

        <div id="countdown-area" class="flex flex-wrap justify-center gap-4 md:gap-8 mb-16">
            <div class="glass w-28 h-36 md:w-44 md:h-56 rounded-[2.5rem] flex flex-col items-center justify-center">
                <span id="minutes" class="text-4xl md:text-7xl font-bold">00</span>
                <span class="text-[10px] uppercase tracking-widest mt-4 opacity-40">Min</span>
            </div>
            <div class="glass w-28 h-36 md:w-44 md:h-56 rounded-[2.5rem] flex flex-col items-center justify-center border-b-blue-500/20 text-blue-400">
                <span id="seconds" class="text-4xl md:text-7xl font-bold">00</span>
                <span class="text-[10px] uppercase tracking-widest mt-4 opacity-40">Sec</span>
            </div>
        </div>

        <button id="music-btn" class="glass px-12 py-5 rounded-full text-xs font-bold tracking-[0.4em] uppercase hover:scale-105 transition-all">
            🎵 Click to Load Music for Test
        </button>
    </main>

    <div id="wish-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6 bg-black/90 backdrop-blur-3xl">
        <div class="glass max-w-lg w-full p-10 rounded-[3rem] text-center border-blue-500/30">
            <h2 class="text-3xl font-black mb-4">TEST CELEBRATION! 🥂</h2>
            <p class="mb-8 opacity-60">หากได้ยินเพลงและเห็นพลุ แสดงว่าระบบพร้อมใช้งานจริงครับ</p>
            <button onclick="location.reload()" class="w-full bg-blue-600 py-5 rounded-2xl font-bold uppercase tracking-widest">Restart Test</button>
        </div>
    </div>

    <audio id="player" loop>
        <source src="narupon_54 - 7589931322466995474.m4a" type="audio/mp4">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // --- การตั้งค่าเวลาทดสอบ (ปรับตามเวลาปัจจุบันของคุณ) ---
        const TARGET = new Date("December 31, 2025 22:45:00").getTime(); 
        const BAN_TIME = new Date("December 31, 2025 22:48:00").getTime(); 
        
        const player = document.getElementById('player');
        const musicBtn = document.getElementById('music-btn');

        musicBtn.addEventListener('click', () => {
            player.play().catch(e => console.log("Music play pending..."));
            musicBtn.innerText = "🔇 Music Loaded & Playing";
        });

        function run() {
            const now = new Date().getTime();
            if (now >= BAN_TIME) {
                document.getElementById('ban-screen').style.display = 'flex';
                document.getElementById('main-ui').style.display = 'none';
                player.pause();
                return;
            }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
            const gap = TARGET - now;
            if (gap > 0) {
                document.getElementById("minutes").innerText = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById("seconds").innerText = Math.floor((gap % (1000 * 60)) / 1000).toString().padStart(2, '0');
            } else {
                startTestCeleb();
            }
        }

        let isDone = false;
        function startTestCeleb() {
            if (isDone) return;
            isDone = true;
            document.getElementById('countdown-area').innerHTML = "<div class='text-6xl font-black animate-pulse text-blue-400'>TESTING...</div>";
            document.getElementById('wish-modal').classList.remove('hidden');
            document.getElementById('wish-modal').classList.add('flex');
            setInterval(() => {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
            }, 250);
        }

        setInterval(run, 1000);
        run();
    </script>
</body>
</html>
